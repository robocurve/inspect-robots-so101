name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + strict typing, once. mypy targets the 3.10 floor via pyproject; running
  # it on 3.11 avoids NumPy's 3.12-only stub syntax.
  quality:
    name: lint · type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv
        run: uv venv --python 3.11
      - name: Install (dev extras; inspect-robots from a git tag)
        run: uv pip install -e ".[dev]"
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy

  # Blocking test gate across the supported OS x Python matrix (100% coverage).
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv (py${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install (dev extras)
        run: uv pip install -e ".[dev]"
      - name: Pytest (100% coverage)
        run: uv run pytest --cov --cov-report=term-missing

  # Real-import guard for the lazily-imported lerobot seam. The unit tests fake
  # these modules (sys.modules), so only this job catches upstream drift in the
  # import paths / symbols the seam code relies on (lerobot.policies.factory,
  # lerobot.async_inference.helpers, lerobot.datasets.*, the SO follower driver).
  # lerobot needs Python >= 3.12; UV_TORCH_BACKEND=cpu avoids the multi-GB CUDA torch.
  lerobot-seam:
    name: lerobot seam imports (py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv (py3.12)
        run: uv venv --python 3.12
      - name: Install with lerobot extra (CPU torch)
        env:
          UV_TORCH_BACKEND: cpu
        run: uv pip install -e ".[dev,lerobot]"
      - name: Import every seam symbol against the real lerobot
        run: |
          uv run python - <<'PY'
          # Exactly the imports the lazy seams perform at runtime.
          import torch

          from lerobot.async_inference.helpers import raw_observation_to_observation
          from lerobot.policies.factory import get_policy_class, make_pre_post_processors
          from lerobot.robots.so_follower import SOFollower
          from lerobot.robots.so_follower.config_so_follower import SOFollowerRobotConfig

          from inspect_robots_so101.config import LeRobotPolicyConfig, SOArmConfig
          from inspect_robots_so101.policy import (
              _hw_observation_features,
              _import_hw_to_dataset_features,
          )

          # The version-tolerant import must resolve against the installed lerobot.
          hw_to_dataset_features = _import_hw_to_dataset_features()

          # Construct the config objects the seams construct (no hardware touched).
          policy_cfg = LeRobotPolicyConfig()
          arm_cfg = SOArmConfig()
          robot_cfg = SOFollowerRobotConfig(port=arm_cfg.port)
          features = hw_to_dataset_features(
              _hw_observation_features(policy_cfg), "observation", use_video=False
          )
          assert "observation.state" in features, features
          print("lerobot seam OK:", torch.__version__)
          print("  get_policy_class:", get_policy_class)
          print("  make_pre_post_processors:", make_pre_post_processors)
          print("  raw_observation_to_observation:", raw_observation_to_observation)
          print("  hw_to_dataset_features:", hw_to_dataset_features)
          print("  SOFollower:", SOFollower, "| config:", type(robot_cfg).__name__)
          PY

  # Dependency hygiene: the package must import with ONLY its runtime deps
  # (inspect-robots + numpy) — no torch or lerobot (those are lazy `lerobot` extras).
  import-hygiene:
    name: import without lerobot/hardware extras
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Create venv
        run: uv venv --python 3.12
      - name: Install runtime only (no extras)
        run: uv pip install -e .
      - name: Assert optional deps absent, then import
        run: |
          uv run python - <<'PY'
          import importlib.util
          for mod in ("torch", "lerobot"):
              assert importlib.util.find_spec(mod) is None, f"{mod} unexpectedly installed"
          import inspect_robots_so101
          print("inspect_robots_so101", inspect_robots_so101.__version__, "imported with runtime deps only")
          PY
